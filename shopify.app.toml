# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4d2f3b730d0358ed516e46b75f0a3a12"
name = "Cited"
application_url = "https://example.com"
embedded = true

[build]
# Let `shopify app dev` swap in the tunnel URL for the dev session so the
# embedded frame loads the local app instead of the placeholder application_url.
automatically_update_urls_on_dev = true
dev_store_url = "cited-dev-gc.myshopify.com"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/create"
  topics = [ "products/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/update"
  topics = [ "products/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/products/delete"
  topics = [ "products/delete" ]

  # Mandatory GDPR / privacy compliance webhooks (required for App Store).
  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact",
  ]

[app_proxy]
# Serves llms.txt at https://{shop}/apps/cited/llms.txt (forwarded to /proxy/*).
# NOTE: `url` must point at the live app URL — update to the deployed/tunnel URL
# and run `shopify app deploy` before the llms.txt live QA (Phase 6 / QA-6).
url = "https://example.com/proxy"
subpath = "cited"
prefix = "apps"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Minimum-necessary for current phases: read (Phase 2 sync) + write (Phase 3 enrichment).
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]
